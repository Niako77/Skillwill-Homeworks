<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./dist/output.css" rel="stylesheet" />
    <title>Document</title>
  </head>
  <body>
    <main
      class="font-sans h-screen flex items-center justify-center bg-[#1E1E1E]"
    >
      <div class="flex flex-col border-solid w-100 bg-transparent">
        <div class="flex mx-auto h-8.75 mb-17.5">
          <img class="h-8" src="images/icon.svg" alt="icon" />
        </div>
        <div
          class="flex flex-col h-93.25 p-9 bg-[#161D2F] border-none rounded-[20px]"
        >
          <h1 class="text-amber-50 text-[35px] font-extralight mb-4">Login</h1>
          <div
            class="text-amber-50 opacity-50 gap-5 flex flex-col font-extralight"
          >
            <input
              class="p-2.5 border-b border-[#5A698F]"
              type="email"
              placeholder="Email Adress"
            />
            <input
              class="p-2.5 border-b border-[#5A698F]"
              type="password"
              placeholder="Password"
            />
          </div>

          <button
            class="text-white font-extralight font-extralights bg-[#FC4747] py-3.5 rounded-lg mt-9"
          >
            Login to your account
          </button>
          <div
            class="flex justify-center items-center gap-2 mt-4 font-extralight"
          >
            <span class="text-white">Don’t have an account?</span>
            <a class="text-[#FC4747]">Sign Up</a>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>

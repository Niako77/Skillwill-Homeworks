<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <title>Audiophile ecommerce</title>
    <link href="scss/audiophile.css" rel="stylesheet" />
  </head>

  <body>
    <main>
      <div class="banner">
        <div class="nav-box">
          <img class="img-hamburger" src="images/menu.svg" alt="Menu" />

          <img
            class="img-audiophile"
            src="images/audiophile.png"
            alt="audiophile-logo"
          />

          <nav class="navbar">
            <div>HOME</div>
            <div>HEADPHONES</div>
            <div>SPEAKERS</div>
            <div>EARPHONES</div>
          </nav>

          <img class="img-basket" src="images/basket.svg" alt="basket" />
        </div>

        <div class="line1"></div>
        <div class="advert-container">
          <div class="description">
            <p>new product</p>
            <h1>XX99 Mark II Headphones</h1>
            <p>
              Experience natural, lifelike audio and exceptional build quality
              made for the passionate music enthusiast.
            </p>
            <button>See product</button>
          </div>
          <img
            class="big-headphone"
            src="images/background.png"
            alt="Headphone"
          />
        </div>
      </div>

      <div class="product-container">
        <div class="product-item">
          <img src="images/headphones.svg" />
          <div class="textbox">
            <h2>headphones</h2>
            <div class="shop-link">
              <h5>shop</h5>
              <img src="images/arrow.svg" alt="arrow" />
            </div>
          </div>
        </div>

        <div class="product-item">
          <img src="images/speakers.svg" />
          <div class="textbox">
            <h2>speakers</h2>
            <div class="shop-link">
              <h5>shop</h5>
              <img src="images/arrow.svg" alt="arrow" />
            </div>
          </div>
        </div>

        <div class="product-item">
          <img src="images/earphones.png" />
          <div class="textbox">
            <h2>earphones</h2>
            <div class="shop-link">
              <h5>shop</h5>
              <img src="images/arrow.svg " alt="arrow" />
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>

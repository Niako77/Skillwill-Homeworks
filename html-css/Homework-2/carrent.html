<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="scss/carrent.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
    <title>Car Rental Website</title>
  </head>

  <body>
    <header>
      <nav class="navigation">
        <div class="logo-search-wrapper">
          <a href="">Morent</a>
          <form action="">
            <img src="images/icons/search.svg" alt="Search icon" />
            <input type="text" placeholder="Search something here" />
            <img src="images/icons/filter.svg" alt="Filter icon" />
          </form>
        </div>

        <div class="cta-wrapper">
          <a href=""
            ><img
              class="heart-button"
              src="images/icons/heart.svg"
              alt="heart"
              width="24px"
          /></a>
          <a class="notification-button"
            ><img
              src="images/icons/notification.svg"
              alt="notifications"
              width="24px"
          /></a>
          <a href=""
            ><img
              class="settings-button"
              src="images/icons/setting.svg"
              alt="settings"
              width="24px"
          /></a>
          <a href=""
            ><img
              src="images/icons/profile photo.png"
              alt="Profile"
              width="44px"
          /></a>
        </div>
      </nav>
    </header>

    <main>
      <section class="rental-cards-wrapper">
        <div class="rental-card rental-card-left">
          <div class="circle-1"></div>
          <div class="circle-2"></div>
          <div class="circle-3"></div>
          <div class="circle-4"></div>
          <div class="circle-5"></div>
          <div class="circle-6"></div>

          <div class="text-wrapper">
            <h1>The Best Platform for Car Rental</h1>
            <p>
              Ease of doing a car rental safely and reliably. Of course at a low
              price.
            </p>
            <div>
              <button>Rental Car</button>
              <section class="car-img-container">
                <img src="images/cars/rental card left car.svg" />
              </section>
            </div>
          </div>
        </div>

        <div class="rental-card rental-card-right">
          <section class="line-1">
            <div class="polygon"></div>
            <div class="polygon"></div>
            <div class="polygon"></div>
            <div class="polygon"></div>
            <div class="polygon"></div>
            <div class="polygon"></div>
            <div class="polygon"></div>
            <div class="polygon"></div>
          </section>
          <section class="line-2">
            <div class="polygon"></div>
            <div class="polygon"></div>
            <div class="polygon"></div>
            <div class="polygon"></div>
            <div class="polygon"></div>
            <div class="polygon"></div>
            <div class="polygon"></div>
            <div class="polygon"></div>
          </section>
          <section class="line-3">
            <div class="polygon"></div>
            <div class="polygon"></div>
            <div class="polygon"></div>
            <div class="polygon"></div>
            <div class="polygon"></div>
            <div class="polygon"></div>
            <div class="polygon"></div>
            <div class="polygon"></div>
          </section>

          <div class="text-wrapper">
            <h1>Easy way to rent a car at a low price</h1>
            <p>
              Providing cheap car rental services and safe and comfortable
              facilities.
            </p>
            <div>
              <button>Rental Car</button>
              <section class="car-img-container">
                <img src="images/cars/rental card right car.svg" />
              </section>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
